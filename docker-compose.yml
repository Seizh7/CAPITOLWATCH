services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: capitolwatch:latest
    container_name: capitolwatch-dashboard
    ports:
      - "8501:8501"
    volumes:
      # Mount only the files the Streamlit dashboard actually reads at runtime
      - ./data/capitolwatch.db:/app/data/capitolwatch.db:ro
      - ./data/outputs:/app/data/outputs:ro
    environment:
      APP_ENV: production
    restart: unless-stopped
